apis:
  - aid: govdata-de:catalog
    name: GovData Deutschland CKAN Action API
    description: >-
      CKAN Action API for GovData Deutschland, a consistent JSON-over-HTTP interface over a catalog of 151,112 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://www.govdata.de/ckan/api/3/action/.
    humanURL: https://www.govdata.de/ckan
    baseURL: https://www.govdata.de/ckan/api/3/action
