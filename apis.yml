aid: govdata-de
name: GovData Deutschland
description: >-
  GovData Deutschland is a national government open-data portal for Germany running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 151,112 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
kind: government
